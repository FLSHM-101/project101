<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Super Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:#0b0f1a;color:white;}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#020617;
    position:sticky;
    top:0;
}

nav a{color:white;text-decoration:none;margin:0 10px;}

/* HERO */
.hero{
    height:60vh;
    background:url("https://images.unsplash.com/photo-1619767886558-efdc259cde1a") center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero h1{
    background:rgba(0,0,0,0.7);
    padding:20px;
    border-radius:10px;
}

/* SEARCH */
.search{
    text-align:center;
    margin:20px;
}

.search input{
    padding:10px;
    width:300px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:#111827;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{transform:scale(1.05);}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{padding:15px;}

.price{color:#00ffcc;font-weight:bold;}

button{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    background:#00ffcc;
    cursor:pointer;
}

/* RESULT */
.result{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#020617;
    padding:15px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<nav>
    <h2>EV Super Store</h2>
    <div>
        <a href="#cars">Cars</a>
        <a href="#parts">Parts</a>
    </div>
</nav>

<div class="hero">
    <h1>Electric Cars & Parts ⚡</h1>
</div>

<div class="search">
    <input type="text" id="search" placeholder="Search...">
</div>

<h2 style="text-align:center;">Cars 🚗</h2>
<div class="grid" id="cars"></div>

<h2 style="text-align:center;">Parts 🔧</h2>
<div class="grid" id="parts"></div>

<div class="result" id="result"></div>

<script>

/* DATA */

/* 20+ CARS */
let cars = [
"Tesla Model 3","Tesla Model Y","Tesla Model S","Tesla Model X",
"BMW i4","BMW iX","Audi e-tron","Audi Q4 e-tron",
"Mercedes EQS","Mercedes EQA","Hyundai Ioniq 5","Hyundai Ioniq 6",
"Kia EV6","Kia Niro EV","Ford Mustang Mach-E","Nissan Leaf",
"Volkswagen ID.4","Volkswagen ID.3","Porsche Taycan","Chevy Bolt",
"Volvo XC40 Recharge","Polestar 2"
];

/* 40+ PARTS */
let parts = [
"EV Charger","Fast Charger","Charging Cable","Battery Pack","Tires","Wheels",
"Brake Pads","Motor Controller","Cooling System","Inverter","DC Converter",
"Touch Screen","Car Camera","Parking Sensor","Seat Cover","LED Lights",
"Car Cover","GPS System","Dash Cam","Air Filter","Battery Cooling Fan",
"Power Cable","Charging Adapter","USB Charger","Interior Lights",
"Floor Mats","Car Alarm","Side Mirror","Spoiler","Roof Rack",
"Door Handle","Smart Key","Car Lock","Steering Wheel","Horn",
"Radiator","Suspension","Shock Absorber","Windshield","Rear Camera"
];

/* FUNCTION TO CREATE CARD */
function createCard(name, type){
    let img = "https://source.unsplash.com/400x300/?" + (type === "car" ? "electric car" : "car part");

    return `
    <div class="card">
        <img src="${img}">
        <div class="card-content">
            <h3>${name}</h3>
            <p class="price">${Math.floor(Math.random()*50000)+500}$</p>
            <button onclick="buy('${name}')">Buy</button>
        </div>
    </div>
    `;
}

/* DISPLAY */
function display(){
    let search = document.getElementById("search").value.toLowerCase();

    let carsHTML = cars.filter(c=>c.toLowerCase().includes(search))
        .map(c=>createCard(c,"car")).join("");

    let partsHTML = parts.filter(p=>p.toLowerCase().includes(search))
        .map(p=>createCard(p,"part")).join("");

    document.getElementById("cars").innerHTML = carsHTML;
    document.getElementById("parts").innerHTML = partsHTML;
}

display();

/* SEARCH */
document.getElementById("search").addEventListener("input", display);

/* BUY */
function buy(item){
    let box = document.getElementById("result");
    box.style.display="block";
    box.innerText = "Added to cart: " + item + " 🛒";

    setTimeout(()=>{box.style.display="none";},3000);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Super Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:#0b0f1a;color:white;}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#020617;
    position:sticky;
    top:0;
}

nav a{color:white;text-decoration:none;margin:0 10px;}

/* HERO */
.hero{
    height:60vh;
    background:url("https://images.unsplash.com/photo-1619767886558-efdc259cde1a") center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero h1{
    background:rgba(0,0,0,0.7);
    padding:20px;
    border-radius:10px;
}

/* SEARCH */
.search{
    text-align:center;
    margin:20px;
}

.search input{
    padding:10px;
    width:300px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:#111827;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{transform:scale(1.05);}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{padding:15px;}

.price{color:#00ffcc;font-weight:bold;}

button{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    background:#00ffcc;
    cursor:pointer;
}

/* RESULT */
.result{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#020617;
    padding:15px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<nav>
    <h2>EV Super Store ⚡</h2>
    <div>
        <a href="#cars">Cars</a>
        <a href="#parts">Parts</a>
    </div>
</nav>

<div class="hero">
    <h1>Electric Cars & Parts Marketplace</h1>
</div>

<div class="search">
    <input type="text" id="search" placeholder="Search cars or parts...">
</div>

<h2 style="text-align:center;">Cars 🚗</h2>
<div class="grid" id="cars"></div>

<h2 style="text-align:center;">Parts 🔧</h2>
<div class="grid" id="parts"></div>

<div class="result" id="result"></div>

<script>

/* صور ثابتة */
let carImages = [
"https://images.unsplash.com/photo-1619767886558-efdc259cde1a",
"https://images.unsplash.com/photo-1620891549027-942fdc95d3f5",
"https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2",
"https://images.unsplash.com/photo-1580273916550-e323be2ae537",
"https://images.unsplash.com/photo-1593941707882-a56bbc8a08d7"
];

let partImages = [
"https://images.unsplash.com/photo-1606813902910-d6f57c8cfcfb",
"https://images.unsplash.com/photo-1581093458791-9c4c6f1c0c3b",
"https://images.unsplash.com/photo-1616628182501-1f7b2d7f8a91",
"https://images.unsplash.com/photo-1605559424983-2c0c2e8b1f6e",
"https://images.unsplash.com/photo-1580273916550-e323be2ae537"
];

/* 20+ سيارات */
let cars = [
"Tesla Model 3","Tesla Model Y","Tesla Model S","Tesla Model X",
"BMW i4","BMW iX","Audi e-tron","Audi Q4 e-tron",
"Mercedes EQS","Mercedes EQA","Hyundai Ioniq 5","Hyundai Ioniq 6",
"Kia EV6","Kia Niro EV","Ford Mustang Mach-E","Nissan Leaf",
"Volkswagen ID.4","Volkswagen ID.3","Porsche Taycan","Chevy Bolt",
"Volvo XC40 Recharge","Polestar 2"
];

/* 40+ قطع */
let parts = [
"EV Charger","Fast Charger","Charging Cable","Battery Pack","Tires","Wheels",
"Brake Pads","Motor Controller","Cooling System","Inverter","DC Converter",
"Touch Screen","Car Camera","Parking Sensor","Seat Cover","LED Lights",
"Car Cover","GPS System","Dash Cam","Air Filter","Battery Cooling Fan",
"Power Cable","Charging Adapter","USB Charger","Interior Lights",
"Floor Mats","Car Alarm","Side Mirror","Spoiler","Roof Rack",
"Door Handle","Smart Key","Car Lock","Steering Wheel","Horn",
"Radiator","Suspension","Shock Absorber","Windshield","Rear Camera"
];

/* إنشاء كارت */
function createCard(name, type, index){
    let img = type === "car"
        ? carImages[index % carImages.length]
        : partImages[index % partImages.length];

    return `
    <div class="card">
        <img src="${img}">
        <div class="card-content">
            <h3>${name}</h3>
            <p class="price">${Math.floor(Math.random()*50000)+500}$</p>
            <button onclick="buy('${name}')">Buy</button>
        </div>
    </div>
    `;
}

/* عرض */
function display(){
    let search = document.getElementById("search").value.toLowerCase();

    let carsHTML = cars
        .filter(c=>c.toLowerCase().includes(search))
        .map((c,i)=>createCard(c,"car",i))
        .join("");

    let partsHTML = parts
        .filter(p=>p.toLowerCase().includes(search))
        .map((p,i)=>createCard(p,"part",i))
        .join("");

    document.getElementById("cars").innerHTML = carsHTML;
    document.getElementById("parts").innerHTML = partsHTML;
}

display();

/* البحث */
document.getElementById("search").addEventListener("input", display);

/* شراء */
function buy(item){
    let box = document.getElementById("result");
    box.style.display="block";
    box.innerText = "Added to cart: " + item + " 🛒";

    setTimeout(()=>{box.style.display="none";},3000);
}

</script>

</body>
</html>

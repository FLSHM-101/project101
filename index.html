<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Car Marketplace</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#0b0f1a;
    color:white;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    background:rgba(0,0,0,0.7);
    position:fixed;
    width:100%;
}

nav h2{
    color:#00ffcc;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#020617,#0f172a);
}

.hero h1{
    font-size:3.5rem;
    color:#00ffcc;
}

.hero p{
    margin:15px;
    color:#ccc;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    padding:80px 40px;
}

/* CARD */
.card{
    background:#111827;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.price{
    color:#00ffcc;
    font-size:1.2rem;
}

button{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    background:#00ffcc;
    cursor:pointer;
    border-radius:8px;
}

/* BUY */
.buy{
    padding:60px 20px;
    text-align:center;
}

form{
    max-width:400px;
    margin:auto;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}

.result{
    margin-top:20px;
    display:none;
    background:#020617;
    padding:20px;
    border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:600px){
    .hero h1{
        font-size:2rem;
    }
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
    <h2>EV Market</h2>
    <div>
        <a href="#home">Home</a>
        <a href="#cars">Cars</a>
        <a href="#buy">Buy</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
    <h1>Electric Cars Marketplace ⚡</h1>
    <p>Choose your dream electric car</p>
</section>

<!-- CARS -->
<section id="cars">
    <div class="grid">

        <!-- TESLA -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a">
            <div class="card-content">
                <h3>Tesla Model 3</h3>
                <p class="price">$40,000</p>
                <button onclick="selectCar('Tesla Model 3')">Buy Now</button>
            </div>
        </div>

        <!-- MODEL Y -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1620891549027-942fdc95d3f5">
            <div class="card-content">
                <h3>Tesla Model Y</h3>
                <p class="price">$50,000</p>
                <button onclick="selectCar('Tesla Model Y')">Buy Now</button>
            </div>
        </div>

        <!-- IONIQ -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2">
            <div class="card-content">
                <h3>Hyundai Ioniq 5</h3>
                <p class="price">$45,000</p>
                <button onclick="selectCar('Hyundai Ioniq 5')">Buy Now</button>
            </div>
        </div>

        <!-- BMW -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1617814076668-3b5f94d78e91">
            <div class="card-content">
                <h3>BMW i4</h3>
                <p class="price">$55,000</p>
                <button onclick="selectCar('BMW i4')">Buy Now</button>
            </div>
        </div>

    </div>
</section>

<!-- BUY -->
<section class="buy" id="buy">
    <h2>Order Your Car 🚗</h2>

    <form id="form">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Email" required>

        <select id="carSelect">
            <option>Select Car</option>
            <option>Tesla Model 3</option>
            <option>Tesla Model Y</option>
            <option>Hyundai Ioniq 5</option>
            <option>BMW i4</option>
        </select>

        <button type="submit">Confirm Order</button>
    </form>

    <div class="result" id="result"></div>
</section>

<script>
function selectCar(car){
    document.getElementById("carSelect").value = car;
    document.getElementById("buy").scrollIntoView({behavior:"smooth"});
}

document.getElementById("form").addEventListener("submit",function(e){
    e.preventDefault();

    let car = document.getElementById("carSelect").value;

    let result = document.getElementById("result");
    result.style.display = "block";
    result.innerText = "Order confirmed for " + car + " 🚀 We will contact you!";
});
</script>

</body>
</html>

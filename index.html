<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Car Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:#0f172a;
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#020617;
    position:sticky;
    top:0;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}

/* HERO */
.hero{
    height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(#0f172a,#1e293b);
}

.hero h1{
    font-size:3rem;
    color:#22c55e;
}

/* CARDS */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:#1e293b;
    margin:15px;
    border-radius:10px;
    width:280px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

button{
    background:#22c55e;
    border:none;
    padding:10px;
    cursor:pointer;
    width:100%;
}

/* FORM */
form{
    max-width:400px;
    margin:auto;
}

input,select{
    width:100%;
    padding:10px;
    margin:10px 0;
}

.result{
    margin-top:20px;
    display:none;
    background:#020617;
    padding:20px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <h2>EV Store</h2>
    <div>
        <a href="#home">Home</a>
        <a href="#cars">Cars</a>
        <a href="#buy">Buy</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
    <h1>Buy Your Electric Car ⚡</h1>
    <p>Discover the best EVs with real prices</p>
</section>

<!-- CARS -->
<section id="cars">
    <h2 style="text-align:center;">Available Cars</h2>

    <div class="container">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a">
            <div class="card-content">
                <h3>Tesla Model 3</h3>
                <p>Price: 389,990 DH</p>
                <button onclick="selectCar('Tesla Model 3')">Buy</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2">
            <div class="card-content">
                <h3>Hyundai Ioniq 5</h3>
                <p>Price: 44000$</p>
                <button onclick="selectCar('Hyundai Ioniq 5')">Buy</button>
            </div>
        </div>

    </div>
</section>

<!-- BUY -->
<section id="buy">
    <h2 style="text-align:center;">Order Your Car</h2>

    <form id="form">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Email" required>

        <select id="carSelect">
            <option>Select Car</option>
            <option>Tesla Model 3</option>
            <option>Hyundai Ioniq 5</option>
        </select>

        <button type="submit">Confirm</button>
    </form>

    <div class="result" id="result"></div>
</section>

<script>
function selectCar(car){
    document.getElementById("carSelect").value = car;
    document.getElementById("buy").scrollIntoView({behavior:"smooth"});
}

document.getElementById("form").addEventListener("submit",function(e){
    e.preventDefault();

    let car = document.getElementById("carSelect").value;

    let result = document.getElementById("result");
    result.style.display = "block";
    result.innerText = "You selected " + car + ". We will contact you soon 🚗";
});
</script>

</body>
</html>

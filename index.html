<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Super Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:#0b0f1a;color:white;}

nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#020617;
}

nav a{color:white;text-decoration:none;margin:0 10px;}

.hero{
    height:60vh;
    background:url("https://images.unsplash.com/photo-1619767886558-efdc259cde1a") center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero h1{
    background:rgba(0,0,0,0.7);
    padding:20px;
    border-radius:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#111827;
    border-radius:10px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{padding:15px;}

.price{color:#00ffcc;}

button{
    margin-top:10px;
    width:100%;
    padding:10px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
}

.result{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#020617;
    padding:15px;
    display:none;
}
</style>
</head>

<body>

<nav>
    <h2>EV Super Store ⚡</h2>
</nav>

<div class="hero">
    <h1>Electric Cars Marketplace</h1>
</div>

<h2 style="text-align:center;">Cars 🚗</h2>
<div class="grid" id="cars"></div>

<h2 style="text-align:center;">Parts 🔧</h2>
<div class="grid" id="parts"></div>

<div class="result" id="result"></div>

<script>

/* سيارات مع صورها */
let cars = [
{name:"Tesla Model 3", price:"40000$", img:"https://images.unsplash.com/photo-1619767886558-efdc259cde1a"},
{name:"Tesla Model Y", price:"50000$", img:"https://images.unsplash.com/photo-1620891549027-942fdc95d3f5"},
{name:"Tesla Model S", price:"80000$", img:"https://images.unsplash.com/photo-1580273916550-e323be2ae537"},
{name:"BMW i4", price:"55000$", img:"https://images.unsplash.com/photo-1617814076668-3b5f94d78e91"},
{name:"Audi e-tron", price:"70000$", img:"https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2"},
{name:"Hyundai Ioniq 5", price:"45000$", img:"https://images.unsplash.com/photo-1605559424983-2c0c2e8b1f6e"},
{name:"Kia EV6", price:"48000$", img:"https://images.unsplash.com/photo-1606813902910-d6f57c8cfcfb"},
{name:"Nissan Leaf", price:"30000$", img:"https://images.unsplash.com/photo-1593941707882-a56bbc8a08d7"}
];

/* قطع مع صورها */
let parts = [
{name:"EV Charger", price:"500$", img:"https://images.unsplash.com/photo-1606813902910-d6f57c8cfcfb"},
{name:"Charging Cable", price:"200$", img:"https://images.unsplash.com/photo-1581093458791-9c4c6f1c0c3b"},
{name:"Battery Pack", price:"5000$", img:"https://images.unsplash.com/photo-1616628182501-1f7b2d7f8a91"},
{name:"Tires", price:"800$", img:"https://images.unsplash.com/photo-1605559424983-2c0c2e8b1f6e"},
{name:"LED Lights", price:"150$", img:"https://images.unsplash.com/photo-1580273916550-e323be2ae537"},
{name:"Car Camera", price:"300$", img:"https://images.unsplash.com/photo-1593941707882-a56bbc8a08d7"}
];

/* إنشاء كارت */
function createCard(item){
    return `
    <div class="card">
        <img src="${item.img}">
        <div class="card-content">
            <h3>${item.name}</h3>
            <p class="price">${item.price}</p>
            <button onclick="buy('${item.name}')">Buy</button>
        </div>
    </div>
    `;
}

/* عرض */
function display(){
    document.getElementById("cars").innerHTML =
        cars.map(createCard).join("");

    document.getElementById("parts").innerHTML =
        parts.map(createCard).join("");
}

display();

/* شراء */
function buy(item){
    let box = document.getElementById("result");
    box.style.display="block";
    box.innerText = "Added: " + item;

    setTimeout(()=>box.style.display="none",3000);
}

</script>

</body>
</html>

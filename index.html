<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EV Cars Morocco</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:#f5f7fa;
    color:#111;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:white;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

nav a{
    text-decoration:none;
    color:#111;
    margin:0 10px;
}

/* HERO */
.hero{
    height:60vh;
    background:url("https://images.unsplash.com/photo-1619767886558-efdc259cde1a") center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.hero h1{
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:10px;
}

/* SEARCH */
.search-box{
    background:white;
    padding:20px;
    margin:-50px auto 30px;
    width:90%;
    max-width:900px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.search-box input, .search-box select{
    padding:10px;
    flex:1;
}

.search-box button{
    background:#00b894;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.price{
    color:#00b894;
    font-weight:bold;
}

/* BUTTON */
button.buy{
    margin-top:10px;
    width:100%;
    padding:10px;
    background:#00b894;
    border:none;
    color:white;
    cursor:pointer;
}

/* FOOTER */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <h2>EV Cars</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">Cars</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Find Your Electric Car ⚡</h1>
</div>

<!-- SEARCH -->
<div class="search-box">
    <input type="text" placeholder="Search car...">
    <select>
        <option>Price</option>
        <option>Low</option>
        <option>High</option>
    </select>
    <button>Search</button>
</div>

<!-- CARS -->
<div class="grid">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a">
        <div class="card-content">
            <h3>Tesla Model 3</h3>
            <p class="price">389,000 DH</p>
            <button class="buy">Buy</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1620891549027-942fdc95d3f5">
        <div class="card-content">
            <h3>Tesla Model Y</h3>
            <p class="price">520,000 DH</p>
            <button class="buy">Buy</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2">
        <div class="card-content">
            <h3>Hyundai Ioniq 5</h3>
            <p class="price">440,000 DH</p>
            <button class="buy">Buy</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1617814076668-3b5f94d78e91">
        <div class="card-content">
            <h3>BMW i4</h3>
            <p class="price">550,000 DH</p>
            <button class="buy">Buy</button>
        </div>
    </div>

</div>

<footer>
    © 2026 EV Cars Morocco
</footer>

</body>
</html>
